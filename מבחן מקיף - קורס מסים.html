document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ont-family:Heebo,sans-serif;font-weight:900;font-size:30px;color:#1b2b29;line-height:1.1\">מבחן אמריקאי מקיף — קורס מסים משולב 2026<\u002Fh1>\n    <\u002Fdiv>\n    <p style=\"color:#6f6a5e;font-size:16px;font-weight:600;margin-right:22px\">{{ subtitle }}<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ============ HOME / TOPIC PICKER ============ -->\n  <sc-if value=\"{{ atHome }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"width:100%;max-width:780px;display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:28px\">\n      <sc-for list=\"{{ topics }}\" as=\"t\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ t.onClick }}\" style=\"{{ t.cardStyle }}\" style-hover=\"transform:translateY(-3px);box-shadow:0 14px 34px rgba(40,35,20,.14)\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;width:100%\">\n            <span style=\"font-family:Heebo,sans-serif;font-weight:900;font-size:15px;letter-spacing:.5px;color:{{ t.accent }}\">נושא {{ t.num }}<\u002Fspan>\n            <span style=\"font-family:Heebo,sans-serif;font-weight:800;font-size:13px;color:#8a8273;background:#f3efe5;border-radius:999px;padding:4px 12px\">{{ t.count }} שאלות<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:Heebo,sans-serif;font-weight:800;font-size:21px;line-height:1.35;color:#1b2b29;text-align:right;margin-top:14px\">{{ t.name }}<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:18px;color:{{ t.accent }};font-family:Heebo,sans-serif;font-weight:700;font-size:16px\">\n            <span>התחל מבחן<\u002Fspan><span style=\"font-size:18px\">←<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ QUIZ ============ -->\n  <sc-if value=\"{{ inQuiz }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"width:100%;max-width:780px;display:flex;justify-content:space-between;align-items:center;margin-top:24px;margin-bottom:10px\">\n      <div style=\"display:flex;align-items:center;gap:12px\">\n        <button onclick=\"{{ onHome }}\" style=\"background:#fff;border:1.5px solid #ddd4c2;border-radius:999px;width:38px;height:38px;cursor:pointer;font-size:18px;color:#0e5a54;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#f3efe5\">→<\u002Fbutton>\n        <span style=\"font-family:Heebo,sans-serif;font-weight:800;font-size:17px;color:{{ accent }}\">{{ topicName }}<\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"font-family:Heebo,sans-serif;font-weight:700;font-size:15px;color:#1b2b29;background:#fff;border:1.5px solid #ddd4c2;border-radius:999px;padding:5px 14px\">שאלה {{ qNum }}/{{ total }} · ניקוד {{ score }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"width:100%;max-width:780px;height:8px;background:#dcd4c2;border-radius:999px;overflow:hidden;margin-bottom:18px\">\n      <div style=\"height:100%;background:{{ accent }};border-radius:999px;transition:width .3s ease;width:{{ progressPct }}\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"width:100%;max-width:780px;background:#fff;border:1px solid #e4ddcd;border-radius:18px;padding:30px 28px;box-shadow:0 8px 28px rgba(40,35,20,.07)\">\n      <div style=\"font-family:Heebo,sans-serif;font-weight:700;font-size:23px;line-height:1.5;color:#1b2b29;margin-bottom:22px\">{{ questionText }}<\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:12px\">\n        <sc-for list=\"{{ options }}\" as=\"opt\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\" style-hover=\"{{ opt.hover }}\">\n            <span style=\"flex:0 0 auto;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f0eadc;color:{{ accent }};font-family:Heebo,sans-serif;font-weight:800;font-size:17px\">{{ opt.letter }}<\u002Fspan>\n            <span style=\"flex:1 1 auto;line-height:1.45\">{{ opt.text }}<\u002Fspan>\n            <span style=\"flex:0 0 auto;font-size:22px;font-weight:900;width:24px;text-align:center\">{{ opt.mark }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:24px;min-height:46px\">\n        <span style=\"font-family:Heebo,sans-serif;font-weight:800;font-size:18px;color:{{ feedbackColor }}\">{{ feedbackText }}<\u002Fspan>\n        <sc-if value=\"{{ answered }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ onNext }}\" style=\"background:{{ accent }};color:#fff;border:none;border-radius:10px;padding:12px 26px;font-family:Heebo,sans-serif;font-weight:700;font-size:18px;cursor:pointer\" style-hover=\"filter:brightness(.92)\">{{ nextLabel }}<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ RESULT ============ -->\n  <sc-if value=\"{{ atResult }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"width:100%;max-width:780px;background:#fff;border:1px solid #e4ddcd;border-radius:18px;padding:46px 28px;box-shadow:0 8px 28px rgba(40,35,20,.07);text-align:center;margin-top:24px\">\n      <div style=\"font-family:Heebo,sans-serif;font-weight:800;font-size:16px;color:{{ accent }}\">{{ topicName }}<\u002Fdiv>\n      <div style=\"font-family:Heebo,sans-serif;font-weight:900;font-size:68px;line-height:1;color:{{ resultColor }};margin-top:6px\">{{ pct }}%<\u002Fdiv>\n      <div style=\"font-family:Heebo,sans-serif;font-weight:800;font-size:24px;color:#1b2b29;margin-top:8px\">{{ resultMsg }}<\u002Fdiv>\n      <div style=\"color:#6f6a5e;font-size:18px;font-weight:600;margin-top:10px\">ענית נכון על {{ correctCount }} מתוך {{ total }} שאלות<\u002Fdiv>\n      <div style=\"display:flex;gap:12px;justify-content:center;margin-top:30px;flex-wrap:wrap\">\n        <button onclick=\"{{ onRetry }}\" style=\"background:{{ accent }};color:#fff;border:none;border-radius:10px;padding:13px 30px;font-family:Heebo,sans-serif;font-weight:700;font-size:18px;cursor:pointer\" style-hover=\"filter:brightness(.92)\">נסה נושא זה שוב<\u002Fbutton>\n        <button onclick=\"{{ onHome }}\" style=\"background:#fff;color:#1b2b29;border:1.5px solid #ddd4c2;border-radius:10px;padding:13px 30px;font-family:Heebo,sans-serif;font-weight:700;font-size:18px;cursor:pointer\" style-hover=\"background:#f3efe5\">חזרה לנושאים<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:860,&quot;height&quot;:960},&quot;passThreshold&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:60,&quot;min&quot;:50,&quot;max&quot;:90,&quot;step&quot;:5,&quot;unit&quot;:&quot;%&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;הגדרות מבחן&quot;},&quot;highlightCorrect&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;הגדרות מבחן&quot;}}\">\nclass Component extends DCLogic {\n  state = { screen: 'home', topic: 0, idx: 0, answered: false, selected: -1, correct: 0 };\n\n  TOPICS = [\n    {\n      name: 'תהליך השחרור (תש\"ר)', accent: '#0e5a54',\n      questions: [\n        { q:`מהו תהליך השחרור (תש\"ר)?`, opts:[`מערכת לתשלום משכורות לעובדי המכס`,`הציר המרכזי של סחר החוץ — תהליך מובנה לשחרור טובין מפיקוח המכס`,`נוהל לרישום חברות יבוא חדשות`,`שיטה לקביעת שערי מטבע חוץ`], ci:1 },\n        { q:`מהי אחת ממטרות התש\"ר?`, opts:[`הורדת מחירי המוצרים לצרכן`,`הגדלת מספר היבואנים`,`גביית מסי אמת`,`קביעת שער הדולר`], ci:2 },\n        { q:`איזו מהבאות היא מטרה של התש\"ר?`, opts:[`אכיפת חוקיות היבוא`,`מתן הלוואות ליבואנים`,`הפקת דוחות לבורסה`,`ניהול נמלי התעופה`], ci:0 },\n        { q:`מהי מטרת התש\"ר הקשורה להברחות?`, opts:[`עידוד הברחות מבוקרות`,`חשיפת ניסיונות הברחה והרתעה`,`התעלמות מהברחות קטנות`,`מיסוי מבריחים בלבד`], ci:1 },\n        { q:`מהו אחד העקרונות המרכזיים של תהליך השחרור?`, opts:[`\"תהליך ללא נייר\"`,`\"תהליך ללא מכס\"`,`\"תהליך ללא יבואנים\"`,`\"תהליך ללא תשלום\"`], ci:0 },\n        { q:`מי נדרש להצטייד בכרטיס חכם?`, opts:[`כל אזרחי המדינה`,`תיירים הנכנסים לישראל`,`חברי קהילת הסחר העובדים במערכת \"שער עולמי\"`,`עובדי משרד החינוך`], ci:2 },\n        { q:`מה מאפשר השימוש בכרטיס החכם?`, opts:[`צפייה בערוצי טלוויזיה`,`מילוי טפסים, שידור צרופות דיגיטליות ושאילתות מזוהות`,`כניסה חופשית לכל הנמלים`,`קבלת הנחות בחנויות`], ci:1 },\n        { q:`היכן ניתן לרכוש כרטיס חכם?`, opts:[`בחברות המתמחות שאושרו ע\"י המכס`,`בכל סניף דואר`,`בבנקים בלבד`,`בנמל התעופה בן גוריון`], ci:0 },\n        { q:`מהי \"הצהרת יבוא\"?`, opts:[`מסמך נייר המוגש פיזית בנמל`,`אישור תשלום מס הכנסה`,`מסר ממוחשב המהווה אסמכתא לשחרור הטובין מפיקוח המכס`,`הודעה לציבור על מוצרים חדשים`], ci:2 },\n        { q:`מהו \"מסר קליטה\"?`, opts:[`מסר ממוחשב של אתר הפריקה/האחסון המאשר כי הטובין התקבלו`,`מסר המאשר את תשלום המסים`,`מסר על שינוי שער המטבע`,`מסר על ביטול עסקה`], ci:0 },\n        { q:`מהו \"מסר התרה\"?`, opts:[`בקשה לביטול עסקה`,`הודעה על הטלת קנס`,`אישור המכס להשלמת הטיפול בהצהרה ולביצוע הפעולה`,`אישור כניסה לנמל`], ci:2 },\n        { q:`מהו \"תיק עסקה אלקטרוני\"?`, opts:[`אוסף מסכים המאפשר אחזור והצגה של כל המידע והמסמכים של עסקת הסחר`,`תיק פלילי של היבואן`,`חשבון הבנק של היבואן`,`רישיון העסק של סוכן המכס`], ci:0 },\n        { q:`בייפוי הכוח — מיהו \"המרשה\"?`, opts:[`סוכן המכס`,`עובד המכס`,`היבואן`,`הגורם המאמת`], ci:2 },\n        { q:`בייפוי הכוח — מיהו \"המורשה\"?`, opts:[`סוכן המכס`,`היבואן`,`מנהל המכס`,`חברת הספנות`], ci:0 },\n        { q:`בייפוי הכוח — מיהו \"המאמת\"?`, opts:[`היבואן`,`מי שמזהה וטוען את המסמך למערכת`,`הצרכן הסופי`,`חברת הספנות`], ci:1 },\n        { q:`אילו צרופות (מסמכים) נחשבות קבילות?`, opts:[`רק מסמכים מקוריים בנייר`,`מסמכים בצבע או בשחור-לבן בסריקה באיכות טובה וקריאה`,`רק מסמכים בכתב יד`,`רק צילומים מהטלפון הנייד`], ci:1 },\n        { q:`מהו השלב הראשון בתהליך השחרור ביב , opts:[`מערכת מס הכנסה`,`מערכת \"שער עולמי\"`,`מערכת הבנקאות`,`מערכת משרד התחבורה`], ci:1 },\n        { q:`איזה ביטוח נדרש הזכיין לשירותי אחסנה להמציא?`, opts:[`ביטוח רכב`,`ביטוח בריאות`,`ביטוח כנגד גניבות`,`ביטוח אובדן הכנסה`], ci:2 },\n        { q:`היכן ממוקם המרכז הארצי לסב\"נים?`, opts:[`ירושלים`,`ישובי עשרת (לוד, אשדוד, קרית גת)`,`באר שבע`,`חיפה`], ci:1 },\n        { q:`מהו אחד המקורות העיקריים מהם מועברים טובין למחסן הסב\"נים?`, opts:[`נמל, מחסני ערובה, מסופי מטען ואולם נוסעים`,`חנויות קמעונאיות`,`משרדי ממשלה`,`בתי דואר פרטיים`], ci:0 },\n        { q:`במחסן סב\"נים — מי משלם את דמי האחסנה?`, opts:[`היבואן`,`המכס`,`סוכן המכס`,`חברת הספנות`], ci:1 },\n        { q:`במחסן רשוי, אחסנת הטובין מוגבלת ל...?`, opts:[`עד שנה`,`עד שנתיים`,`עד שלוש שנים`,`ללא הגבלה`], ci:1 },\n        { q:`במחסן סב\"נים, כיצד מנוהלים הטובין?`, opts:[`לפי גושים`,`לפי פריטים`,`לפי תאריך`,`לפי משקל`], ci:1 },\n        { q:`במחסן רשוי, כיצד מנוהלים הטובין?`, opts:[`לפי פריטים`,`לפי גושים`,`לפי צבע`,`לפי יבואן`], ci:1 },\n        { q:`מהו אחד מסיכוני העבודה מול זכיין פרטי?`, opts:[`עיכוב בשחרור הטובין`,`חשש לטוהר המידות וחשש לגניבות`,`עליית מחירי האחסנה`,`מחסור בעובדים`], ci:1 },\n        { q:`באולם הנוסעים בגשר אלנבי נתפסו במהלך בדיקה שגרתית...?`, opts:[`כדורי הרזיה אסורים בייבוא`,`מטבעות זהב`,`כלי רכב`,`סיגריות`], ci:0 },\n        { q:`מהו אחד מתפקידי יחידת הסב\"נים בבית המכס המרכזי?`, opts:[`קביעת שער הדולר`,`בדיקת חוקיות יבוא של טובין המיועדים למכירה`,`הנפקת דרכונים`,`גביית מס הכנסה`], ci:1 }\n      ]\n    },\n    {\n      name: 'יחידת הסבנים — אשדוד / נעמן', accent: '#3f6f86',\n      questions: [\n        { q:`באיזה בית מכס פועלת היחידה לטיפול בסב\"נים שבמצגת?`, opts:[`בית המכס חיפה`,`בית המכס אשדוד`,`בית המכס ירושלים`,`בית המכס באר שבע`], ci:1 },\n        { q:`מהי הגדרת סב\"ן לפי המצגת?`, opts:[`טובין שיובאו ולא הותר רשימונם ו/או לא שולמו בגינם תוך תקופת האחסנה`,`טובין שיוצאו מהארץ`,`טובין הפטורים ממכס`,`טובין שנמכרו ליבואן`], ci:0 },\n        { q:`מהי תקופת האחסנה בנמל ימי לפני שטובין הופכים לסב\"ן?`, opts:[`45 יום`,`3 חודשים`,`שנה`,`שנתיים`], ci:1 },\n        { q:`מהי תקופת האחסנה בנמל אווירי לפני שטובין הופכים לסב\"ן?`, opts:[`45 יום`,`90 יום`,`3 חודשים`,`שנה`], ci:0 },\n        { q:`מהי תקופת האחסנה במסוף עורפי?`, opts:[`45 יום`,`3 חודשים`,`שנה`,`שנתיים`], ci:2 },\n        { q:`כמה זמן יכולים טובין לשהות בבונדד?`, opts:[`עד שנה`,`עד שנתיים`,`עד 3 שנים`,`עד 5 שנים`], ci:2 },\n        { q:`מיהו המפעיל (הזכיין) של מחסן הסב\"נים החל מ-1/03?`, opts:[`חברת ממ\"ן`,`חברת מחסני ערובה נעמן בע\"מ`,`חברת אמניר`,`חברת בזק`], ci:1 },\n        { q:`מי היה המפעיל עד 12/02?`, opts:[`נעמן`,`אמניר`,`ממ\"ן`,`המכס עצמו`], ci:2 },\n        { q:`מהי אחת ממטרות הקמת היחידה?`, opts:[`בדיקת חוקיות יבוא של טובין המיועדים למכירה`,`גביית מס הכנסה`,`הנפקת רישיונות נהיגה`,`קביעת מחירי דלק`], ci:0 },\n        { q:`מי מלווה את קביעת השמאות לטובין טרם מכרז כגורם מייעץ?`, opts:[`שמאי`,`עורך דין`,`רואה חשבון`,`סוכן ביטוח`], ci:0 },\n        { q:`מהו המקור הגדול ביותר לקליטת תיקי סב\"ן לפי הנתונים?`, opts:[`גשר אלנבי`,`נתב\"ג`,`בונדדים`,`מעברי גבול`], ci:1 },\n        { q:`אילו טובין מטופלים ומושמדים בנעמן?`, opts:[`סיגריות, קניין רוחני, כלי רכב וטובין אסורים ביבוא`,`מזון טרי בלבד`,`ספרי לימוד`,`ציוד משרדי`], ci:0 },\n        { q:`מי עומד בראש המבנה הארגוני של היחידה?`, opts:[`ראש ענף`,`ממונה יחידת הסבנ\"ים`,`מעריך בכיר`,`בודק`], ci:1 },\n        { q:`כל כמה זמן מוכן מכרז מטלטלין למכירה?`, opts:[`כל שבוע`,`כל שבועיים`,`כל 3 שבועות`,`כל חודש`], ci:2 },\n        { q:`ב\"הלכת כנען\" המוזכרת במצגת מדובר ב...?`, opts:[`זכות העקיבה`,`זכות הקדימה`,`זכות הביטול`,`זכות הערעור`], ci:0 },\n        { q:`בסוגיית הציור \"הכובע הצהוב\" — מי הצייר?`, opts:[`אוגוסטין קרדנס`,`אביגדור אריכא`,`מרק שאגאל`,`ראובן רובין`], ci:1 },\n        { q:`בבדיקת שיקוף של מטען נמצאו כ-330,000 כדורי...?`, opts:[`אקמול`,`סיאליס`,`ויטמינים`,`אספירין`], ci:1 },\n        { q:`כיצד הובחן אייפון מקורי ממזויף לפי המצגת?`, opts:[`לפי הצבע`,`לפי מספר כרטיסי SIM וצורת הסמל (שטוח מול שקוע)`,`לפי המשקל`,`לפי גודל המסך`], ci:1 },\n        { q:`אילו סעיפים בפקודת המכס צוינו כרלוונטיים לסב\"ן?`, opts:[`16, 19, 71`,`33, 65(ג), 81, 98`,`87, 89, 90`,`170, 210, 212`], ci:1 },\n        { q:`מהו אחד מתפקידי היחידה?`, opts:[`פיקוח על השמדות וועדת מכירות של הטובין`,`גביית ארנונה`,`רישום תאגידים`,`ניהול נמל התעופה`], ci:0 }\n      ]\n    },\n    {\n      name: 'עיקרי החקיקה — פקודה ותקנות', accent: '#5a6e3a',\n      questions: [\n        { q:`במה עוסק סעיף 16 לפקודה?`, opts:[`זכות הבדיקה — פיקוח רשות המכס לבדוק כל טובין`,`ביטול רישיון מחסן`,`השמדת טובין`,`אחריות סוכנים`], ci:0 },\n        { q:`אם בעל הטובין אינו מתייצב — תוך כמה ימים מותר לפתוח אריזות לבדיקה שלא בפניו?`, opts:[`7 ימים`,`10 ימים`,`15 יום`,`30 יום`], ci:2 },\n        { q:`במה עוסק סעיף 71 לפקודה?`, opts:[`זכות גישה למחסן`,`ביטול רישיון למחסן`,`פיצול וסידור טובין`,`טובין מסוכנים`], ci:1 },\n        { q:`מה מקנה סעיף 79 לפקודה לפקיד המכס?`, opts:[`זכות לגבות מס`,`רשות גישה למחסן בכל זמן סביר`,`סמכות לעצור אנשים`,`זכות למכור טובין`], ci:1 },\n        { q:`במה עוסק סעיף 87 לפקודה?`, opts:[`פיצול וסידור טובין`,`עבירות וענישה`,`ערבויות`,`ביטוח מחסן`], ci:0 },\n        { q:`לפי סעיף 84, חוסר בטובין מוחסנים ללא הסבר מחייב את בעל הרישיון לשלם...?`, opts:[`קנס קבוע`,`כפל המכס`,`מחצית המכס`,`פטור מלא`], ci:1 },\n        { q:`במה עוסק סעיף 89 לפקודה?`, opts:[`השמדת טובין מוחסנים`,`זכות הבדיקה`,`ערבויות בנקאיות`,`טובין מסוכנים`], ci:0 },\n        { q:`לפי סעיף 90, טובין מסוכנים (עלולים להישרף או להתפוצץ) — אסור לאחסנם אלא...?`, opts:[`באישור משרד הביטחון`,`ברשות גובה המכס`,`בנמל בלבד`,`ללא כל הגבלה`], ci:1 },\n        { q:`לפי סעיף 170, סוכן מורשה הפועל בשם בעל הטובין נחשב כ...?`, opts:[`עובד מכס`,`בעל הטובין גופו ונושא באחריות אישית לתשלום המכס`,`גורם פטור מאחריות`,`מתווך בלבד`], ci:1 },\n        { q:`לפי סעיף 22 לתקנות, בעל רישיון מחסן חייב להעסיק...?`, opts:[`עורך דין`,`מנהל בעל כישורים הדרושים לניהול מחסן רשוי`,`רואה חשבון`,`שומר`], ci:1 },\n        { q:`לפי סעיף 23(ב) לתקנות, כמה זמן יש לשמור מסמכים הנוגעים לטובין?`, opts:[`שנה`,`שנתיים`,`שלוש שנים לפחות`,`חמש שנים`], ci:2 },\n        { q:`העברת שליטה או ניהול של מחסן רשוי מחייבת...?`, opts:[`הודעה לעירייה`,`אישור מוקדם בכתב של המנהל`,`פרסום ברשומות`,`הסכמת היבואנים`], ci:1 },\n        { q:`תוך כמה ימים יש להעביר טובין למחסן לאחר התרת רשימון החסנה (מחסן רגיל)?`, opts:[`7 ימים`,`15 יום`,`30 יום`,`90 יום`], ci:1 },\n        { q:`לאחר התרת רשימון יבוא לצריכה בארץ — תוך כמה ימים יש להוציא את הטובין מהמחסן?`, opts:[`30 ימים`,`45 ימים`,`60 ימים`,`90 ימים`], ci:3 },\n        { q:`לפי סעיף 15 לתקנות, מהו גובה הערבות הבנקאית הנדרשת?`, opts:[`25% ממסי היבוא`,`50% ממסי היבוא`,`75% ממסי היבוא`,`100% ממסי היבוא`], ci:1 },\n        { q:`במקרה של ביטול פוליסת ביטוח — תוך כמה ימים מראש חייבת חברת הביטוח להודיע למנהל?`, opts:[`7 ימים`,`14 ימים`,`30 ימים`,`60 ימים`], ci:2 },\n        { q:`מהו העונש על סילוק טובין חבי מכס ממחסן ללא רשות (סעיף 210)?`, opts:[`קנס בלבד`,`מאסר שנתיים או 5000 ₪`,`אזהרה`,`שלילת רישיון בלבד`], ci:1 },\n        { q:`מי רשאי לבטל רישיון מחסן אם הייתה סיבה מספקת?`, opts:[`גובה המכס`,`הממשלה`,`בית המשפט`,`היבואן`], ci:1 },\n        { q:`במחסן רכב — תוך כמה ימים יש להעביר את הרכב למחסן לאחר התרת הצהרת היבוא להחסנה?`, opts:[`15 יום`,`30 יום`,`60 יום`,`90 יום`], ci:3 },\n        { q:`מהי דוגמה לטובין שנחשבים \"חסרים שלא נתקבלו במחסן\" (סעיף 84)?`, opts:[`טובין שנמכרו במכרז`,`טובין שנגנבו טרם הגעתם למחסן לפי דו\"ח חקירה של חברת הביטוח`,`טובין שהושמדו כדין`,`טובין ששוחררו ליבואן`], ci:1 }\n      ]\n    }\n  ];\n\n  start(t){ this.setState({ screen:'quiz', topic:t, idx:0, answered:false, selected:-1, correct:0 }); }\n  goHome(){ this.setState({ screen:'home' }); }\n  answer(i){\n    if(this.state.answered) return;\n    const q = this.TOPICS[this.state.topic].questions[this.state.idx];\n    this.setState(s => ({ answered:true, selected:i, correct: s.correct + (i===q.ci?1:0) }));\n  }\n  next(){\n    const qs = this.TOPICS[this.state.topic].questions;\n    if(this.state.idx >= qs.length - 1){ this.setState({ screen:'result' }); return; }\n    this.setState(s => ({ idx: s.idx + 1, answered:false, selected:-1 }));\n  }\n  retry(){ this.start(this.state.topic); }\n\n  renderVals(){\n    const { screen, topic, idx, answered, selected, correct } = this.state;\n    const thresh = this.props.passThreshold ?? 60;\n    const showCorrect = this.props.highlightCorrect ?? true;\n    const self = this;\n    const letters = ['א','ב','ג','ד'];\n\n    const topics = this.TOPICS.map((t, i) => ({\n      num: i + 1, name: t.name, accent: t.accent, count: t.questions.length,\n      cardStyle: `display:flex;flex-direction:column;align-items:stretch;text-align:right;background:#fff;border:1px solid #e4ddcd;border-top:5px solid ${t.accent};border-radius:16px;padding:22px 22px 20px;box-shadow:0 6px 20px rgba(40,35,20,.06);cursor:pointer;transition:transform .18s ease,box-shadow .18s ease;min-height:170px;font-family:Assistant,sans-serif`,\n      onClick: () => self.start(i)\n    }));\n\n    if(screen === 'home'){\n      return { subtitle:'בחר/י נושא — כל נושא כולל 20 שאלות אמריקאיות עם ציון מיידי',\n        atHome:true, inQuiz:false, atResult:false, topics };\n    }\n\n    const T = this.TOPICS[topic];\n    const qs = T.questions, total = qs.length;\n    const q = qs[idx] || qs[0];\n    const accent = T.accent;\n\n    const sBase = 'display:flex;align-items:center;gap:14px;width:100%;text-align:right;padding:14px 16px;border-radius:12px;font-family:Assistant,sans-serif;font-size:18px;font-weight:600;color:#23211c;transition:all .15s ease';\n    const base = sBase + ';border:2px solid #e6dfce;background:#fff;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.03)';\n    const green = sBase + ';border:2px solid #2f9e5f;background:#e7f4ec;color:#185b34;font-weight:700;cursor:default';\n    const red = sBase + ';border:2px solid #d4513c;background:#fbeae7;color:#9c2c1c;font-weight:700;cursor:default';\n    const dim = base + ';opacity:.5;cursor:default';\n\n    const options = q.opts.map((text, i) => {\n      let style = base, hover = `border-color:${accent};background:#fbfaf5`, mark = '', onClick = null;\n      if(!answered){ onClick = () => self.answer(i); }\n      else {\n        hover = '';\n        const isCorrect = i === q.ci, isSel = i === selected;\n        if(isSel && isCorrect){ style = green; mark = '✓'; }\n        else if(isSel && !isCorrect){ style = red; mark = '✗'; }\n        else if(isCorrect && showCorrect){ style = green; mark = '✓'; }\n        else { style = dim; }\n      }\n      return { text, letter: letters[i], style, hover, mark, onClick };\n    });\n\n    const completed = idx + (answered ? 1 : 0);\n    const last = idx >= total - 1;\n    const isRight = selected === q.ci;\n    const pct = Math.round((correct / total) * 100);\n    const pass = pct >= thresh;\n    let resultMsg;\n    if(pct >= 90) resultMsg = 'מצוין! שליטה מלאה בחומר';\n    else if(pass) resultMsg = 'כל הכבוד, עברת בהצלחה';\n    else resultMsg = 'לא עברת — כדאי לחזור על החומר';\n\n    return {\n      subtitle: T.name,\n      atHome:false, inQuiz: screen==='quiz', atResult: screen==='result', topics,\n      accent, topicName: T.name, total, qNum: idx + 1, score: correct, answered,\n      questionText: q.q, options,\n      progressPct: Math.round((completed / total) * 100) + '%',\n      feedbackText: !answered ? '' : (isRight ? 'תשובה נכונה!' : 'תשובה שגויה'),\n      feedbackColor: !answered ? '#ffffff' : (isRight ? '#2f9e5f' : '#d4513c'),\n      nextLabel: last ? 'סיום וקבלת ציון' : 'לשאלה הבאה ←',\n      onNext: () => self.next(),\n      pct, correctCount: correct, resultMsg,\n      resultColor: pass ? accent : '#d4513c',\n      onRetry: () => self.retry(), onHome: () => self.goHome()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
